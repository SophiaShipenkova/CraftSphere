services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://diplom_user:DiplomPass2026@postgres:5432/diplom_db"
      JWT_SECRET: "prod-jwt-secret-craftsphere-2026"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "18500:8000"
    volumes:
      - uploads_data:/srv/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: "http://93.183.71.133:18500"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18501:80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: diplom_user
      POSTGRES_PASSWORD: DiplomPass2026
      POSTGRES_DB: diplom_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diplom_user -d diplom_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
